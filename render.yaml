services:
  # Backend Web Service
  - type: web
    name: prompt-wars-backend
    env: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: PORT
        value: 4000
      - key: MONGODB_URI
        sync: false
      - key: ALCHEMY_URL
        sync: false
      - key: RELAYER_PRIVATE_KEY
        sync: false
      - key: FIREBASE_PROJECT_ID
        sync: false
      - key: FIREBASE_CLIENT_EMAIL
        sync: false
      - key: FIREBASE_PRIVATE_KEY
        sync: false
      - key: FRONTEND_URL
        fromService:
          type: static_site
          name: prompt-wars-frontend
          property: url

  # Frontend Static Site
  - type: static_site
    name: prompt-wars-frontend
    env: static
    rootDir: voteiq-app
    buildCommand: npm install && npm run build
    publishDir: dist
    envVars:
      - key: VITE_FIREBASE_API_KEY
        sync: false
      - key: VITE_FIREBASE_AUTH_DOMAIN
        sync: false
      - key: VITE_FIREBASE_PROJECT_ID
        sync: false
      - key: VITE_FIREBASE_STORAGE_BUCKET
        sync: false
      - key: VITE_FIREBASE_MESSAGING_SENDER_ID
        sync: false
      - key: VITE_FIREBASE_APP_ID
        sync: false
      - key: VITE_FIREBASE_MEASUREMENT_ID
        sync: false
      - key: VITE_API_URL
        fromService:
          type: web
          name: prompt-wars-backend
          property: url
